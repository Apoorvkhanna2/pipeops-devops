name: PipeOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - Show directory structure
      run: |
        echo "📁 Repository structure:"
        find . -name "package.json" -type f | head -10
        echo "Frontend directory:"
        ls -la frontend/ || echo "No frontend directory"
        echo "Backend directory:"
        ls -la backend/ || echo "No backend directory"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: |
        if [ -d "frontend" ]; then
          cd frontend
          npm ci
        else
          echo "❌ Frontend directory not found!"
          exit 1
        fi

    - name: Install Backend Dependencies
      run: |
        if [ -d "backend/api-gateway" ]; then
          cd backend/api-gateway
          npm ci
        else
          echo "❌ Backend directory not found!"
          exit 1
        fi

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Run Frontend Tests with Debug
      run: |
        cd frontend
        echo "📝 Running frontend tests..."
        npm test -- --watchAll=false --verbose --passWithNoTests
      continue-on-error: false

    - name: Run Backend Tests with Debug
      run: |
        cd backend/api-gateway
        echo "📝 Running backend tests..."
        npm test -- --verbose --passWithNoTests
      continue-on-error: false

  deploy-demo:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Demo Environment
      run: |
        echo "🚀 Setting up PipeOps Demo Environment"
        echo "Frontend: http://localhost:3000"
        echo "Backend: http://localhost:5000"
        echo "✅ CI/CD Pipeline is working!"