name: PipeOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - Show Directory Structure
      run: |
        echo "📁 Full directory structure:"
        find . -name "package.json" -type f | head -20
        echo ""
        echo "📁 Frontend contents:"
        ls -la frontend/ || echo "❌ Frontend directory not found"
        echo ""
        echo "📁 Backend contents:"
        ls -la backend/ || echo "❌ Backend directory not found"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Verify Test Scripts Exist
      run: |
        echo "🔍 Checking test scripts in package.json files:"
        if [ -f "frontend/package.json" ]; then
          echo "Frontend package.json test script:"
          cat frontend/package.json | grep -A 2 -B 2 "test" || echo "No test script found"
        else
          echo "❌ frontend/package.json not found"
        fi
        
        if [ -f "backend/api-gateway/package.json" ]; then
          echo "Backend package.json test script:"
          cat backend/api-gateway/package.json | grep -A 2 -B 2 "test" || echo "No test script found"
        else
          echo "❌ backend/api-gateway/package.json not found"
        fi

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Backend Dependencies
      run: |
        cd backend/api-gateway
        npm ci

    - name: Run Frontend Tests with Verbose Output
      run: |
        cd frontend
        echo "🧪 Running frontend tests..."
        npm test --silent
      continue-on-error: false

    - name: Run Backend Tests with Verbose Output
      run: |
        cd backend/api-gateway
        echo "🧪 Running backend tests..."
        npm test --silent
      continue-on-error: false

  deploy-demo:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Demo Environment
      run: |
        echo "🚀 Setting up PipeOps Demo Environment"
        echo "Frontend: http://localhost:3000"
        echo "Backend: http://localhost:5000"
        echo "✅ CI/CD Pipeline is working!"